<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>LTPF Portfolio Dashboard</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            margin: 0;\n            padding: 0;\n            background-color: #f4f4f4;\n        }\n        .container {\n            width: 80%;\n            margin: auto;\n            overflow: hidden;\n        }\n        header {\n            background: #35424a;\n            color: #ffffff;\n            padding: 10px 0;\n            text-align: center;\n        }\n        .dashboard {\n            display: flex;\n            flex-wrap: wrap;\n            justify-content: space-around;\n            padding: 20px;\n            background: #ffffff;\n            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);\n        }\n        .card {\n            background: #e6e6e6;\n            margin: 10px;\n            padding: 20px;\n            flex: 1 1 calc(30% - 40px);\n            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);\n            border-radius: 8px;\n        }\n        .card h3 {\n            margin: 0;\n        }\n    </style>\n</head>\n<body>\n    <header>\n        <h1>LTPF Portfolio Dashboard</h1>\n    </header>\n    <div class="container">\n        <div class="dashboard" id="dashboard">\n            <!-- Cards will be dynamically added here -->\n        </div>\n    </div>\n    <script>\n        document.addEventListener('DOMContentLoaded', function() {\n            const dashboard = document.getElementById('dashboard');\n            const data = [\n                { title: 'Project 1', description: 'Description for project 1', date: '2026-01-01' },\n                { title: 'Project 2', description: 'Description for project 2', date: '2026-02-01' },\n                { title: 'Project 3', description: 'Description for project 3', date: '2026-03-01' }\n            ];\n            data.forEach(project => {\n                const card = document.createElement('div');\n                card.className = 'card';\n                card.innerHTML = `\n                    <h3>${project.title}</h3>\n                    <p>${project.description}</p>\n                    <p><strong>Date:</strong> ${project.date}</p>\n                `;\n                dashboard.appendChild(card);\n            });\n        });\n    </script>\n</body>\n</html>\n
